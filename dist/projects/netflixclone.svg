<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="600" height="300" fill="url(#bg)" rx="16"/>
  <rect width="600" height="300" fill="url(#grid)" rx="16" opacity="0.8"/>

  <!-- Glowing orb -->
  <circle cx="480" cy="60" r="120" fill="#00d4ff" opacity="0.08" filter="url(#glow)"/>
  <circle cx="100" cy="240" r="80" fill="#00d4ff" opacity="0.06" filter="url(#glow)"/>

  <!-- Decorative lines -->
  <line x1="0" y1="250" x2="600" y2="250" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="60" y1="0" x2="60" y2="300" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Corner accent -->
  <rect x="0" y="0" width="4" height="60" fill="#00d4ff" rx="2" opacity="0.8"/>
  <rect x="0" y="0" width="60" height="4" fill="#00d4ff" rx="2" opacity="0.8"/>
  <rect x="536" y="296" width="60" height="4" fill="#00d4ff" rx="2" opacity="0.5"/>
  <rect x="596" y="240" width="4" height="60" fill="#00d4ff" rx="2" opacity="0.5"/>

  <!-- Icon circle -->
  <circle cx="300" cy="110" r="50" fill="rgba(255,255,255,0.08)" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
  <text x="300" y="128" text-anchor="middle" font-size="40" fill="#00d4ff" filter="url(#glow)">🎬</text>

  <!-- Title -->
  <text x="300" y="196" text-anchor="middle" font-family="'Bebas Neue', sans-serif" font-size="32" fill="white" letter-spacing="3">NETFLIX CLONE</text>

  <!-- Label pill -->
  <rect x="220" y="214" width="160" height="28" rx="14" fill="rgba(255,255,255,0.1)" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
  <text x="300" y="233" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#00d4ff" letter-spacing="1">TMDB + Firebase</text>
</svg>